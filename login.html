<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HTECHSUBS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="loader-content">
            <div class="loader-logo">
                <svg viewBox="0 0 100 100" class="logo-icon">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2" opacity="0.2"/>
                    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradientPurple)" stroke-width="2" stroke-dasharray="282" stroke-dashoffset="282"/>
                    <defs>
                        <linearGradient id="gradientPurple" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#6C3BFF;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#A366FF;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="loader-text">HTECHSUBS</h1>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar navbar-auth">
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo">H</div>
                <span>HTECHSUBS</span>
            </div>
            <a href="index.html" class="nav-back">← Back</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Log in to your HTECHSUBS account</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email or Phone Number</label>
                    <input 
                        type="text" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email or phone number"
                        required
                    >
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <span class="toggle-icon">👁️</span>
                        </button>
                    </div>
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-loading" id="loginBtn">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader" id="btnLoader"></span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="forgot-password.html" class="link-secondary">Forgot password?</a>
                <p>Don't have an account? <a href="signup.html" class="link-primary">Sign up</a></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer style="text-align: center; padding: 2rem; font-size: 12px; color: #9CA3AF; margin-top: 2rem; border-top: 1px solid #E5E7EB;">
        <p>Developed by TACHAELHUB</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Remove loader after content loads
            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                if (loader) {
                    loader.style.opacity = '0';
                    loader.style.pointerEvents = 'none';
                }
            }, 800);

            // Password toggle
            const passwordToggle = document.getElementById('passwordToggle');
            const passwordInput = document.getElementById('password');

            if (passwordToggle) {
                passwordToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.textContent = type === 'password' ? '👁️' : '🙈';
                });
            }

            // Form submission
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const loginBtn = document.getElementById('loginBtn');
                    loginBtn.classList.add('loading');
                    
                    setTimeout(() => {
                        // Simulate login
                        showNotification('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    }, 1500);
                });
            }
        });
    </script>
</body>
</html>
